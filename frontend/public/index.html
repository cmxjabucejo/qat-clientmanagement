<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/cmxtransparent.png" />
    
    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Theme -->
    <meta name="theme-color" content="#003b5c" />
    
    <!-- Description -->
    <meta
      name="description"
      content="CMX Client Management Suite — A secure internal platform for managing client data, operations, and services. For exclusive use of Callmax Solutions."
    />

    <!-- Author / Ownership -->
    <meta name="author" content="Callmax Solutions" />
    
    <!-- App Title (for SEO + browser tabs) -->
    <title>CMX Client Management Suite | Callmax Solutions</title>

    <!-- Apple -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Optional: Basic Security Headers (frontend hints) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Optional: Prevent indexing (since internal system) -->
    <meta name="robots" content="noindex, nofollow" />
  </head>

  <body>
    <noscript>
      <div style="text-align:center; padding:20px; font-family:sans-serif;">

        <p>
          The CMX Client Management Suite requires JavaScript to run properly.
          Please enable JavaScript in your browser to continue.
        </p>
      </div>
    </noscript>

    <!-- App Root -->
    <div id="root"></div>

    <!-- Footer Notice (can be styled in React instead if preferred) -->
    <footer style="display:none;">
      © 2026 Callmax Solutions. All rights reserved.  
      This system is for the exclusive use of Callmax Solutions and authorized users only.
    </footer>
